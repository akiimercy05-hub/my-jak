<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voting Poster Generator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1a1f35 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            font-family: system-ui, -apple-system;
        }
        
        .container {
            text-align: center;
        }
        
        h1 {
            color: #6366f1;
            margin-bottom: 30px;
            font-size: 28px;
        }
        
        #posterCanvas {
            border: 3px solid #6366f1;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(99, 102, 241, 0.3);
            background: white;
            max-width: 100%;
            height: auto;
            margin-bottom: 20px;
        }
        
        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        button {
            padding: 15px 30px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .download-btn {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
        }
        
        .download-btn:hover {
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4);
            transform: translateY(-2px);
        }
        
        .refresh-btn {
            background: linear-gradient(135deg, #ec4899, #f43f5e);
            color: white;
        }
        
        .refresh-btn:hover {
            box-shadow: 0 10px 30px rgba(236, 72, 153, 0.4);
            transform: translateY(-2px);
        }
        
        p {
            color: #cbd5e1;
            margin-top: 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🗳️ Voting Poster Generator</h1>
        <canvas id="posterCanvas" width="800" height="1000"></canvas>
        <div class="button-group">
            <button class="download-btn" onclick="downloadPoster()">📥 Download Poster as PNG</button>
            <button class="refresh-btn" onclick="generatePoster()">🔄 Generate New Poster</button>
        </div>
        <p>Right-click on image → Save image as... (if buttons don't work)</p>
    </div>

    <script>
        function generatePoster() {
            const canvas = document.getElementById('posterCanvas');
            const ctx = canvas.getContext('2d');

            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Background gradient
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#6366f1');
            gradient.addColorStop(0.5, '#8b5cf6');
            gradient.addColorStop(1, '#ec4899');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Decorative circles
            ctx.fillStyle = 'rgba(255, 255, 255, 0.08)';
            ctx.beginPath();
            ctx.arc(800, -100, 300, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(0, 1000, 250, 0, Math.PI * 2);
            ctx.fill();

            // ===== DRAW SMILING STUDENT =====
            
            // Head (circle) - skin tone
            ctx.fillStyle = '#F4A460';
            ctx.beginPath();
            ctx.arc(400, 240, 85, 0, Math.PI * 2);
            ctx.fill();

            // Eyes - white
            ctx.fillStyle = '#FFFFFF';
            ctx.beginPath();
            ctx.arc(375, 215, 12, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(425, 215, 12, 0, Math.PI * 2);
            ctx.fill();

            // Pupils - black
            ctx.fillStyle = '#000000';
            ctx.beginPath();
            ctx.arc(378, 218, 7, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(428, 218, 7, 0, Math.PI * 2);
            ctx.fill();

            // Eye shine
            ctx.fillStyle = '#FFFFFF';
            ctx.beginPath();
            ctx.arc(380, 216, 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(430, 216, 2, 0, Math.PI * 2);
            ctx.fill();

            // Smile (arc)
            ctx.strokeStyle = '#000000';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.arc(400, 260, 20, 0, Math.PI);
            ctx.stroke();

            // Nose
            ctx.fillStyle = '#E6A876';
            ctx.beginPath();
            ctx.ellipse(400, 240, 8, 12, 0, 0, Math.PI * 2);
            ctx.fill();

            // Hair
            ctx.fillStyle = '#2C1810';
            ctx.beginPath();
            ctx.arc(400, 200, 90, Math.PI * 0.2, Math.PI * 0.8);
            ctx.lineTo(490, 200);
            ctx.lineTo(310, 200);
            ctx.fill();

            // Neck
            ctx.fillStyle = '#F4A460';
            ctx.fillRect(385, 315, 30, 20);

            // School uniform - shirt (blue)
            ctx.fillStyle = '#1E40AF';
            ctx.beginPath();
            ctx.ellipse(400, 370, 75, 70, 0, 0, Math.PI * 2);
            ctx.fill();

            // Collar
            ctx.fillStyle = '#FFFFFF';
            ctx.beginPath();
            ctx.moveTo(370, 330);
            ctx.lineTo(360, 350);
            ctx.lineTo(380, 345);
            ctx.closePath();
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(430, 330);
            ctx.lineTo(440, 350);
            ctx.lineTo(420, 345);
            ctx.closePath();
            ctx.fill();

            // Tie
            ctx.fillStyle = '#DC2626';
            ctx.fillRect(395, 340, 10, 40);

            // Arms
            ctx.fillStyle = '#F4A460';
            ctx.beginPath();
            ctx.ellipse(330, 360, 25, 55, -0.3, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(470, 360, 25, 55, 0.3, 0, Math.PI * 2);
            ctx.fill();

            // Hands
            ctx.fillStyle = '#F4A460';
            ctx.beginPath();
            ctx.arc(310, 415, 18, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(490, 415, 18, 0, Math.PI * 2);
            ctx.fill();

            // Peace sign fingers
            ctx.strokeStyle = '#F4A460';
            ctx.lineWidth = 8;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(315, 395);
            ctx.lineTo(315, 425);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(325, 395);
            ctx.lineTo(325, 425);
            ctx.stroke();

            // Pants
            ctx.fillStyle = '#1F2937';
            ctx.fillRect(360, 430, 30, 60);
            ctx.fillRect(410, 430, 30, 60);

            // Shoes
            ctx.fillStyle = '#000000';
            ctx.beginPath();
            ctx.ellipse(375, 495, 20, 12, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(425, 495, 20, 12, 0, 0, Math.PI * 2);
            ctx.fill();

            // ===== TEXT SECTIONS =====

            // Main title
            ctx.font = 'bold 58px Arial';
            ctx.fillStyle = '#FFFFFF';
            ctx.textAlign = 'center';
            ctx.shadowColor = 'rgba(0, 0, 0, 0.5)';
            ctx.shadowBlur = 10;
            ctx.shadowOffsetY = 3;
            ctx.fillText('🗳️ E-VOTING', 400, 570);

            // Subtitle
            ctx.font = 'bold 32px Arial';
            ctx.fillStyle = '#FFFFFF';
            ctx.fillText('ELECTION DAY', 400, 615);

            // Three pillars
            const pillars = [
                { icon: '🔐', label: 'SECURE', x: 150 },
                { icon: '🌍', label: 'TRANSPARENT', x: 400 },
                { icon: '✓', label: 'VALIDATIVE', x: 650 }
            ];

            pillars.forEach(pillar => {
                // Box background
                ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
                ctx.fillRect(pillar.x - 90, 660, 180, 90);
                
                // Box border
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
                ctx.lineWidth = 2;
                ctx.strokeRect(pillar.x - 90, 660, 180, 90);

                // Icon
                ctx.font = 'bold 40px Arial';
                ctx.fillStyle = '#FFFFFF';
                ctx.textAlign = 'center';
                ctx.fillText(pillar.icon, pillar.x, 695);

                // Label
                ctx.font = 'bold 18px Arial';
                ctx.fillStyle = '#FFD700';
                ctx.fillText(pillar.label, pillar.x, 730);
            });

            // Tagline
            ctx.font = 'italic 22px Arial';
            ctx.fillStyle = '#FFFFFF';
            ctx.textAlign = 'center';
            ctx.shadowColor = 'rgba(0, 0, 0, 0.3)';
            ctx.shadowBlur = 5;
            ctx.fillText('Democracy in Young Citizens', 400, 810);

            // Main call to action
            ctx.font = 'bold 28px Arial';
            ctx.fillStyle = '#FFD700';
            ctx.textAlign = 'center';
            ctx.shadowColor = 'rgba(0, 0, 0, 0.5)';
            ctx.shadowBlur = 8;
            ctx.fillText('MAKE YOUR VOTE COUNT', 400, 870);

            // Bottom line
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(120, 900);
            ctx.lineTo(680, 900);
            ctx.stroke();

            // Footer
            ctx.font = 'bold 18px Arial';
            ctx.fillStyle = '#FFFFFF';
            ctx.textAlign = 'center';
            ctx.fillText('Fair • Secure • Transparent • For All', 400, 955);
        }

        function downloadPoster() {
            const canvas = document.getElementById('posterCanvas');
            const link = document.createElement('a');
            link.href = canvas.toDataURL('image/png', 1.0);
            link.download = 'voting-poster-' + new Date().getTime() + '.png';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // Generate poster on page load
        window.addEventListener('load', generatePoster);
    </script>
</body>
</html>
