<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voting Poster Generator</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: system-ui;
        }
        canvas {
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            max-width: 100%;
            height: auto;
        }
        .download-btn {
            margin-top: 20px;
            padding: 12px 24px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
        }
        .download-btn:hover {
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.4);
        }
    </style>
</head>
<body>
    <div style="text-align: center;">
        <canvas id="posterCanvas" width="800" height="1000"></canvas>
        <br>
        <button class="download-btn" onclick="downloadPoster()">📥 Download Poster</button>
    </div>

    <script>
        function drawPoster() {
            const canvas = document.getElementById('posterCanvas');
            const ctx = canvas.getContext('2d');

            // Background gradient
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#6366f1');
            gradient.addColorStop(0.5, '#8b5cf6');
            gradient.addColorStop(1, '#ec4899');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Add accent shapes
            ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.beginPath();
            ctx.arc(800, -100, 300, 0, Math.PI * 2);
            ctx.fill();

            ctx.beginPath();
            ctx.arc(0, 1000, 250, 0, Math.PI * 2);
            ctx.fill();

            // Draw student head (circle)
            ctx.fillStyle = '#FFD700';
            ctx.beginPath();
            ctx.arc(400, 250, 80, 0, Math.PI * 2);
            ctx.fill();

            // Draw student face
            ctx.fillStyle = '#FDB833';
            ctx.beginPath();
            ctx.arc(400, 280, 70, 0, Math.PI * 2);
            ctx.fill();

            // Eyes
            ctx.fillStyle = '#333';
            ctx.beginPath();
            ctx.arc(380, 260, 8, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(420, 260, 8, 0, Math.PI * 2);
            ctx.fill();

            // Smiling mouth (arc)
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(400, 295, 15, 0, Math.PI);
            ctx.stroke();

            // Body
            ctx.fillStyle = '#4CAF50';
            ctx.fillRect(350, 360, 100, 80);

            // Arms
            ctx.fillStyle = '#FDB833';
            ctx.fillRect(320, 380, 30, 50);
            ctx.fillRect(450, 380, 30, 50);

            // Hands
            ctx.fillStyle = '#FDB833';
            ctx.beginPath();
            ctx.arc(320, 440, 15, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(480, 440, 15, 0, Math.PI * 2);
            ctx.fill();

            // Legs
            ctx.fillStyle = '#333';
            ctx.fillRect(365, 440, 15, 60);
            ctx.fillRect(420, 440, 15, 60);

            // Shoes
            ctx.fillStyle = '#222';
            ctx.fillRect(360, 500, 25, 15);
            ctx.fillRect(415, 500, 25, 15);

            // Top title - VOTING SYSTEM
            ctx.font = 'bold 56px system-ui';
            ctx.fillStyle = '#FFFFFF';
            ctx.textAlign = 'center';
            ctx.textShadow = '0 4px 8px rgba(0,0,0,0.3)';
            ctx.fillText('🗳️ E-VOTING', 400, 580);

            // Subtitle
            ctx.font = 'bold 28px system-ui';
            ctx.fillStyle = '#E0E0E0';
            ctx.fillText('STUDENT ELECTION', 400, 620);

            // Three pillars of voting
            const pillars = [
                { word: '🔐 SECURE', x: 150 },
                { word: '🌍 TRANSPARENT', x: 400 },
                { word: '✓ VALIDATIVE', x: 650 }
            ];

            ctx.font = 'bold 22px system-ui';
            pillars.forEach(pillar => {
                // Pillar background
                ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
                ctx.beginPath();
                ctx.roundRect(pillar.x - 85, 660, 170, 80, 10);
                ctx.fill();

                // Border
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.roundRect(pillar.x - 85, 660, 170, 80, 10);
                ctx.stroke();

                // Text
                ctx.fillStyle = '#FFFFFF';
                ctx.textAlign = 'center';
                ctx.fillText(pillar.word, pillar.x, 710);
            });

            // Tagline
            ctx.font = 'italic 20px system-ui';
            ctx.fillStyle = '#FFFFFF';
            ctx.textAlign = 'center';
            ctx.fillText('Democracy in Young Citizens', 400, 800);

            // Vote for change message
            ctx.font = 'bold 24px system-ui';
            ctx.fillStyle = '#FFD700';
            ctx.textAlign = 'center';
            ctx.fillText('MAKE YOUR VOTE COUNT', 400, 860);

            // Bottom decorative line
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(150, 900);
            ctx.lineTo(650, 900);
            ctx.stroke();

            // Footer text
            ctx.font = '16px system-ui';
            ctx.fillStyle = '#FFFFFF';
            ctx.textAlign = 'center';
            ctx.fillText('Fair • Secure • Transparent • For All', 400, 950);
        }

        // Polyfill for roundRect if needed
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                if (w < 2 * r) r = w / 2;
                if (h < 2 * r) r = h / 2;
                this.beginPath();
                this.moveTo(x + r, y);
                this.arcTo(x + w, y, x + w, y + h, r);
                this.arcTo(x + w, y + h, x, y + h, r);
                this.arcTo(x, y + h, x, y, r);
                this.arcTo(x, y, x + w, y, r);
                this.closePath();
                return this;
            };
        }

        function downloadPoster() {
            const canvas = document.getElementById('posterCanvas');
            const link = document.createElement('a');
            link.href = canvas.toDataURL('image/png');
            link.download = 'voting-poster.png';
            link.click();
        }

        // Draw poster when page loads
        window.onload = drawPoster;
    </script>
</body>
</html>
